services:
  - type: web
    name: eb1a-ai-system-release
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: eb1a-case-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: DATA_DIR
        value: /data
      - key: MAX_UPLOAD_MB
        value: "500"
